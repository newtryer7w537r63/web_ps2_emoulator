<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <!-- Controller body -->
  <path d="M30 50 Q20 40 15 55 L10 90 Q10 105 25 105 L45 100 Q55 108 100 108 Q145 108 155 100 L175 105 Q190 105 190 90 L185 55 Q180 40 170 50 L155 45 Q140 30 100 28 Q60 30 45 45 Z"
        fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>
  <!-- Left grip -->
  <path d="M15 70 Q8 80 10 95 Q12 108 25 107 L40 102 Q30 90 28 75 Z" fill="#111122" stroke="#333" stroke-width="1"/>
  <!-- Right grip -->
  <path d="M185 70 Q192 80 190 95 Q188 108 175 107 L160 102 Q170 90 172 75 Z" fill="#111122" stroke="#333" stroke-width="1"/>

  <!-- D-Pad -->
  <rect x="38" y="52" width="10" height="28" rx="2" fill="#2a2a3e"/>
  <rect x="32" y="58" width="22" height="10" rx="2" fill="#2a2a3e"/>
  <!-- D-Pad arrows -->
  <polygon points="43,54 41,58 45,58" fill="#555"/>
  <polygon points="43,78 41,74 45,74" fill="#555"/>
  <polygon points="34,63 38,61 38,65" fill="#555"/>
  <polygon points="52,63 48,61 48,65" fill="#555"/>

  <!-- Analog sticks -->
  <circle cx="65" cy="78" r="10" fill="#1e1e32" stroke="#333" stroke-width="1"/>
  <circle cx="65" cy="78" r="7" fill="#0d0d1a" stroke="#444" stroke-width="0.5"/>
  <circle cx="135" cy="78" r="10" fill="#1e1e32" stroke="#333" stroke-width="1"/>
  <circle cx="135" cy="78" r="7" fill="#0d0d1a" stroke="#444" stroke-width="0.5"/>

  <!-- Face buttons -->
  <!-- Triangle -->
  <circle cx="162" cy="52" r="7" fill="#1e3a2e" stroke="#1db954" stroke-width="1.5"/>
  <text x="162" y="56" text-anchor="middle" font-size="8" fill="#1db954">△</text>
  <!-- Circle -->
  <circle cx="172" cy="62" r="7" fill="#3a1e1e" stroke="#ff4444" stroke-width="1.5"/>
  <text x="172" y="66" text-anchor="middle" font-size="8" fill="#ff4444">○</text>
  <!-- Cross -->
  <circle cx="162" cy="72" r="7" fill="#1e2a3a" stroke="#4488ff" stroke-width="1.5"/>
  <text x="162" y="76" text-anchor="middle" font-size="9" fill="#4488ff">✕</text>
  <!-- Square -->
  <circle cx="152" cy="62" r="7" fill="#3a1e3a" stroke="#cc44ff" stroke-width="1.5"/>
  <text x="152" y="66" text-anchor="middle" font-size="8" fill="#cc44ff">□</text>

  <!-- L1/L2/R1/R2 -->
  <rect x="25" y="32" width="30" height="10" rx="4" fill="#222235" stroke="#444" stroke-width="1"/>
  <text x="40" y="40" text-anchor="middle" font-size="7" fill="#888">L1</text>
  <rect x="20" y="20" width="28" height="9" rx="3" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="34" y="27" text-anchor="middle" font-size="7" fill="#888">L2</text>

  <rect x="145" y="32" width="30" height="10" rx="4" fill="#222235" stroke="#444" stroke-width="1"/>
  <text x="160" y="40" text-anchor="middle" font-size="7" fill="#888">R1</text>
  <rect x="152" y="20" width="28" height="9" rx="3" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="166" y="27" text-anchor="middle" font-size="7" fill="#888">R2</text>

  <!-- Select / Start -->
  <rect x="85" y="50" width="14" height="6" rx="2" fill="#222235" stroke="#444" stroke-width="0.8"/>
  <text x="92" y="55" text-anchor="middle" font-size="5" fill="#666">SEL</text>
  <rect x="101" y="50" width="14" height="6" rx="2" fill="#222235" stroke="#444" stroke-width="0.8"/>
  <text x="108" y="55" text-anchor="middle" font-size="5" fill="#666">STA</text>

  <!-- PS button -->
  <circle cx="100" cy="68" r="7" fill="#003087" stroke="#0050d0" stroke-width="1.5"/>
  <text x="100" y="72" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">PS</text>
</svg>
